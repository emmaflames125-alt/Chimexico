<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background ring -->
  <circle cx="100" cy="100" r="92" fill="#111827" stroke="#1F2937" stroke-width="16"/>
  
  <!-- Main circle with gradient -->
  <circle cx="100" cy="100" r="72" fill="url(#mainGrad)"/>
  
  <!-- Stylized taco/chat icon -->
  <path d="M65 75 Q100 45 135 75 Q140 95 135 115 Q100 135 65 115 Q60 95 65 75" fill="#C8102E" stroke="#FFD700" stroke-width="12" stroke-linejoin="round"/>
  
  <!-- Inner highlight -->
  <path d="M75 80 Q100 55 125 80" fill="none" stroke="#fff" stroke-width="8" stroke-opacity="0.3"/>
  
  <!-- Chat dots -->
  <circle cx="80" cy="95" r="7" fill="#fff"/>
  <circle cx="100" cy="95" r="7" fill="#fff"/>
  <circle cx="120" cy="95" r="7" fill="#fff"/>
  
  <!-- Text -->
  <text x="100" y="175" text-anchor="middle" fill="#F3F4F6" font-size="18" font-weight="700" letter-spacing="3" font-family="system-ui">CHIMEXICO</text>
  
  <defs>
    <linearGradient id="mainGrad" x1="40" y1="40" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="50%" stop-color="#006400"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
</svg>
